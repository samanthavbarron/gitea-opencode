name: "opencode Gitea Action"
description: "Run opencode in Gitea Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent."
    required: false

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive)."
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  config:
    description: "Stored as ~/.config/opencode/opencode.jsonc before invoking opencode"
    required: false

  prompt:
    description: |
      Intended for advanced users only. This replaces the default prompt sent to opencode, interpreting it first as a string by bash (including variable expansion). Available bash environment variables (may) include:
      USERNAME, ISSUE_TITLE, ISSUE_NUMBER, TRIGGERING_REQUEST_BODY, ISSUE_DETAILS_JSON, ISSUE_COMMENTS_JSON, PR_REVIEWS_JSON, PR_REVIEW_COMMENTS_JSON, IS_PR, NOT_PR.
      If the event is not related to an existing PR, the following are unset: PR_REVIEWS_JSON, PR_REVIEW_COMMENTS_JSON, IS_PR. If it is related to an existing PR, only the "NOT_PR" variable is unset.
      See "Build opencode prompt" step in the gitea-opencode action codebase for the default prompt as an example.
    required: false

  pr-creation-pat:
    description: "Personal Access Token for a bot type user, allowing PRs to be opened. Requires write access to repositories. User may need to be invited as contributor to the project as well."
    required: false

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Get opencode version
      id: opencode_version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache opencode
      id: cache_opencode
      uses: actions/cache@v4
      with:
        path: ~/.opencode/bin
        key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.opencode_version.outputs.version }}

    - name: Install opencode
      if: steps.cache_opencode.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://opencode.ai/install | bash

    - name: Get jq version
      id: jq_version
      shell: bash
      run: |
        VERSION=$(curl -fsSL https://api.github.com/repos/jqlang/jq/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache jq
      id: cache_jq
      uses: actions/cache@v4
      with:
        path: ~/.jq/bin
        key: jq-${{ runner.os }}-${{ runner.arch }}-${{ steps.jq_version.outputs.version }}
      
    - name: Install jq
      if: steps.cache_jq.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/.jq/bin
        curl -fsSL https://github.com/jqlang/jq/releases/download/${{ steps.jq_version.outputs.version }}/jq-linux-amd64 > ~/.jq/bin/jq
        chmod +x ~/.jq/bin/jq

    - name: Add opencode and jq to PATH
      shell: bash
      run: echo -e "$HOME/.opencode/bin\n$HOME/.jq/bin" >> $GITHUB_PATH

    - name: Set default curl options
      shell: bash
      run: |
        echo "fail
        silent
        show-error
        location
        header = \"Authorization: Bearer $GITHUB_TOKEN\"
        header = \"Accept: application/json\"
        header = \"Content-Type: application/json\"" >> ~/.curlrc

    #- name: Debug Output
    #  shell: bash
    #  run: |
    #    echo "::group::Event Debugging Output"
    #    echo "--------------"
    #    echo "Env Variables:"
    #    echo "--------------"
    #    env
    #    echo "---------------"
    #    echo "Gitea Object:"
    #    echo "---------------"
    #    cat <<'EOF'
    #    ${{ toJSON(github) }}
    #    EOF
    #    echo "--------------"
    #    echo "Event Details:"
    #    echo "--------------"
    #    cat $GITHUB_EVENT_PATH
    #    echo ""
    #    echo "::endgroup::"

    - name: Add opencode config
      if: inputs.config != ''
      env:
        CONFIG: ${{ inputs.config }}
      shell: bash
      run: |
        mkdir -p ~/.config/opencode
        echo "$CONFIG" > ~/.config/opencode/opencode.jsonc

    - name: Get Details
      id: get_details
      shell: bash
      run: |
        echo "::group::Get Details"

        # Get basic info and find out what type of request this is
        REPO_API_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"
        BRANCH_NAME="opencode-$EPOCHREALTIME"
        echo "$(jq -c '.sender' $GITHUB_EVENT_PATH)" > $RUNNER_TEMP/sender_details.json
        echo "$(jq -c '.repository' $GITHUB_EVENT_PATH)" > $RUNNER_TEMP/repo_details.json
        if [ "$GITHUB_EVENT_NAME" == "issue_comment" ]; then
          ISSUE_ID="$(jq -r '.issue.number' $GITHUB_EVENT_PATH)"
          [ "$(jq -r '.is_pull' $GITHUB_EVENT_PATH)" == "true" ] && ISSUE_TYPE="Pull Request" || ISSUE_TYPE="Issue"
          jq -r '.comment.body' $GITHUB_EVENT_PATH > $RUNNER_TEMP/triggering_request_body
        elif [ "$GITHUB_EVENT_NAME" == "pull_request_review_comment" ]; then
          ISSUE_ID="$(jq -r '.number' $GITHUB_EVENT_PATH)"
          ISSUE_TYPE="Pull Request"
          jq -r '.review.content' $GITHUB_EVENT_PATH > $RUNNER_TEMP/triggering_request_body
        elif [ "$GITHUB_EVENT_NAME" == "issues" ]; then
          ISSUE_ID="$(jq -r '.number' $GITHUB_EVENT_PATH)"
          ISSUE_TYPE="Issue"
          jq -r '.issue.body' $GITHUB_EVENT_PATH > $RUNNER_TEMP/triggering_request_body
        else
          echo "::endgroup::"
          echo "!!!!!!! Unknown event name: $GITHUB_EVENT_NAME !!!!!!!"
          exit 1
        fi

        # Get Issue related info
        ISSUE_API_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/$ISSUE_ID"
        if [ "$(jq -rc '.issue' $GITHUB_EVENT_PATH)" == "null" ]; then
          echo "Hitting the API to get Issue Details"
          curl "$ISSUE_API_URL" | jq -c '{number: .number, title: .title, body: .body, assets: .assets, comment_count: .comments, username: .user.username}' > $RUNNER_TEMP/issue_details.json
        else
          jq -c '{number: .issue.number, title: .issue.title, body: .issue.body, assets: .issue.assets, comment_count: .issue.comments, username: .issue.user.username}' $GITHUB_EVENT_PATH > $RUNNER_TEMP/issue_details.json
        fi
        echo "Hitting the API to get Issue Comments"
        curl "$ISSUE_API_URL/comments" | jq -c 'map({id, body, assets, username: .user.username})' > $RUNNER_TEMP/issue_comments.json

        # Get PR related info
        if [ "$ISSUE_TYPE" == "Pull Request" ]; then
          if [ "$(jq -rc '.pull_request' $GITHUB_EVENT_PATH)" == "null" ]; then
            echo "Hitting the API to get PR Details"
            curl "$REPO_API_URL/pulls/$ISSUE_ID" > $RUNNER_TEMP/pr_details.json
          else
            jq -c '.pull_request' $GITHUB_EVENT_PATH > $RUNNER_TEMP/pr_details.json
          fi
          echo "Hitting the API to get PR Reviews"
          curl "$REPO_API_URL/pulls/$ISSUE_ID/reviews?page=1&limit=1000" > $RUNNER_TEMP/pr_reviews.json

          echo "Hitting the API (repeatedly) to get PR Review Comments"
          jq -r '.[].id' $RUNNER_TEMP/pr_reviews.json | xargs -I {} curl "$REPO_API_URL/pulls/$ISSUE_ID/reviews/{}/comments" | jq -cs 'flatten | map(select(. != null) | {id, body, username: .user.username, pull_request_review_id, path, commit_id, original_commit_id, diff_hunk, position, original_position})' > $RUNNER_TEMP/pr_review_comments.json
          BRANCH_NAME="$(jq -r '.head.ref' $RUNNER_TEMP/pr_details.json)"
        fi

        # Triggering Request Body: $RUNNER_TEMP/triggering_request_body
        # Sender Details: $RUNNER_TEMP/sender_details.json
        # Repo Details: $RUNNER_TEMP/repo_details.json

        # Issue Details: $RUNNER_TEMP/issue_details.json
        # Issue Comments: $RUNNER_TEMP/issue_comments.json

        # PR Details: $RUNNER_TEMP/pr_details.json
        # PR Reviews: $RUNNER_TEMP/pr_reviews.json
        # PR Review Comments: $RUNNER_TEMP/pr_review_comments.json

        # Output Variables
        echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
        echo "issue_type=$ISSUE_TYPE" >> $GITHUB_OUTPUT
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

        echo "::endgroup::"

    - name: React to original comment
      if: github.event_name == 'issue_comment'
      shell: bash
      run: |
        # Easy when it's a regular comment, otherwise we won't worry about attaching it
        COMMENT_ID="$(jq -r '.comment.id' $GITHUB_EVENT_PATH)"
        REPO_API_URL="$(jq -r '.url' $RUNNER_TEMP/repo_details.json)"
        echo "Reacting to original comment"
        curl -X 'POST' "$REPO_API_URL/issues/comments/$COMMENT_ID/reactions" -d '{"content": "eyes"}' > /dev/null

    - name: Create git commit details and hooks to attribute work properly
      shell: bash
      env:
        BRANCH_NAME: ${{ steps.get_details.outputs.branch_name }}
      run: |
        echo "::group::Create git details and hooks"
        git config --global init.defaultBranch main
        git config --global push.autoSetupRemote true
        git config --global user.email "$(jq -r '.email' $RUNNER_TEMP/sender_details.json)"
        git config --global user.name "$(jq -r '.full_name' $RUNNER_TEMP/sender_details.json)"

        echo "Creating pre-commit hook to include Co-authored-by trailer"
        echo '#!/bin/bash
        COMMIT_MSG_FILE=$1
        COMMIT_SOURCE=$2
        TRAILER="Co-authored-by: opencode <opencode@noreply.localhost>"
        [ "$COMMIT_SOURCE" != "merge" ] && git interpret-trailers --in-place --trailer "$TRAILER" --if-exists addIfDifferent "$COMMIT_MSG_FILE"
        ' > .git/hooks/prepare-commit-msg

        echo "Creating a post-commit hook to set the committer details (vs author details)"
        echo '#!/bin/bash
        [ "$AMENDING" == "true" ] && exit 0
        export AMENDING=true
        GIT_COMMITTER_NAME="opencode" GIT_COMMITTER_EMAIL="opencode@noreply.localhost" git commit --amend --no-edit --no-verify 
        ' > .git/hooks/post-commit

        chmod +x .git/hooks/prepare-commit-msg .git/hooks/post-commit

        echo "Switching current repo to $BRANCH_NAME"
        git switch "$BRANCH_NAME" 2>/dev/null || git switch -c "$BRANCH_NAME"
        echo "::endgroup::"

    - name: Build opencode prompt
      shell: bash
      id: build_opencode_prompt
      run: |
        echo "::group::Build opencode prompt"
        USERNAME="$(jq -r '.username' "$RUNNER_TEMP/sender_details.json")"
        ISSUE_TITLE="$(jq -r '.title' "$RUNNER_TEMP/issue_details.json")"
        ISSUE_NUMBER="$(jq -r '.number' "$RUNNER_TEMP/issue_details.json")"
        TRIGGERING_REQUEST_BODY="$(cat "$RUNNER_TEMP/triggering_request_body")"
        [ -f "$RUNNER_TEMP/issue_details.json" ] && ISSUE_DETAILS_JSON="$(jq -c '.' "$RUNNER_TEMP/issue_details.json")"
        [ -f "$RUNNER_TEMP/issue_comments.json" ] && ISSUE_COMMENTS_JSON="$(jq -c '.' "$RUNNER_TEMP/issue_comments.json")"
        [ -f "$RUNNER_TEMP/pr_reviews.json" ] && PR_REVIEWS_JSON="$(jq -c '.' "$RUNNER_TEMP/pr_reviews.json")"
        [ -f "$RUNNER_TEMP/pr_review_comments.json" ] && PR_REVIEW_COMMENTS_JSON="$(jq -c '.' "$RUNNER_TEMP/pr_review_comments.json")"

        if [ "$GITHUB_EVENT_NAME" == "pull_request_review_comment" ]; then
          LATEST_PR_REVIEW_ID="$(jq -c 'first(.[] | select(.stale == false)).id' "$RUNNER_TEMP/pr_reviews.json")"
          TASK_MESSAGE="The user $USERNAME submitted a review ($LATEST_PR_REVIEW_ID) of a Pull Request, ${MENTIONS:+invoking you (with a string from \"$MENTIONS\") to }address the review:"
        elif [ "$GITHUB_EVENT_NAME" == "issue_comment" ]; then
          COMMENT_ID="$(jq -r '.comment.id' "$GITHUB_EVENT_PATH")"
          TASK_MESSAGE="The user $USERNAME has sent a comment ($COMMENT_ID), ${MENTIONS:+invoking you (with a string from \"$MENTIONS\") to }address the comment:"
        elif [ "$GITHUB_EVENT_NAME" == "issues" ]; then
          TASK_MESSAGE="The user $USERNAME has opened an issue ($ISSUE_NUMBER), ${MENTIONS:+invoking you (with a string from \"$MENTIONS\") to }address the issue:"
        else
          echo "::endgroup::"
          echo "!!!!!!! Unknown event name: $GITHUB_EVENT_NAME !!!!!!!"
          exit 1
        fi

        [ -f "$RUNNER_TEMP/pr_details.json" ] && IS_PR='true' || NOT_PR='true'

        # --------------------
        # START DEFAULT PROMPT
        # --------------------

        # This IS supposed to be non-interpreted at this point (single quotes).
        # It DOES get interpreted later (a few lines down), if no user specified prompt is provided.
        DEFAULT_UNINTERPRETED_PROMPT="$(cat <<'GITHUB_OUTPUT_EOF_TOKEN'
        You are an AI assistant that helps develop and improve code repositories. The git repository in question is in the current directory.

        ## Task
        $TASK_MESSAGE
        $TRIGGERING_REQUEST_BODY

        Please execute the requested task using the available tools.
        Evaluate the ${IS_PR:-Issue}${IS_PR:+Pull Request} and any attached information to fully understand the task.
        Be thorough in your analysis and provide clear explanations.

        ${NOT_PR:+## Context
        ${ISSUE_TITLE:+* **Issue Title**: $ISSUE_TITLE}
        ${ISSUE_DETAILS_JSON:+* **Issue Details**: $ISSUE_DETAILS_JSON}
        ${ISSUE_COMMENTS_JSON:+* **All Issue Comments**: $ISSUE_COMMENTS_JSON}}\
        ${IS_PR:+## Context
        ${ISSUE_TITLE:+* **Pull Request Title**: $ISSUE_TITLE}
        ${ISSUE_DETAILS_JSON:+* **Pull Request Details**: $ISSUE_DETAILS_JSON}
        ${ISSUE_COMMENTS_JSON:+* **Pull Request Comments**: $ISSUE_COMMENTS_JSON}
        ${PR_REVIEWS_JSON:+* **All Pull Request Reviews**: $PR_REVIEWS_JSON}
        ${PR_REVIEW_COMMENTS_JSON:+* **All Pull Request Review Comments**: $PR_REVIEW_COMMENTS_JSON}}

        ## Guidelines
        - Explore the codebase before making changes
        - Follow existing code/style conventions
        - ALWAYS make a code change, reply with a comment response, or both.
        - If no code change is required to address the request, DO NOT make one arbitrarily.
        - To reply with a comment: output text response (markdown format is allowed)
        - To make code changes: commit with clear messages
        ${NOT_PR:+\
        - To create a new Pull Request, commit changes locally. DO NOT PUSH TO THE REMOTE REPO. Follow Pull Request Creation Guidelines.
        - **Consider A Comment Response**: Although a PR may well be the target of a request, other times the user is simply looking for a comment response, perhaps an evaluation of code or of an idea. Consider if a PR is relevant to address the request, or if a comment response is most appropriate instead.}\
        ${IS_PR:+\
        - To update the existing Pull Request, commit additional changes locally. DO NOT PUSH TO THE REMOTE REPO.}
        - You may include any other potential issues found in your response comment, but do not make additional changes without the direction to do so.
        - If no response comment is neccesary to complete the task, simply commit any required changes and respond with the exact text \`Changes complete\`.
        - **ALWAYS COMMIT OR RESET ANY CHANGES**: Do not leave the repository in a "dirty" state (can check with \`git status --porcelain\`).

        ${NOT_PR:+## Pull Request Creation Guidelines
        * **First Commit Creates the PR**: The first commit summary (first line) and body text (subsequent lines) made will be used to define the title and description of the new pull request, respectively.
        * **Description is Markdown**: The Pull Request description (subsequent lines in the commit) is interpreted in markdown format. Be sure any backticks are escaped properly (so they aren't interpreted by bash) when passing the commit message on the commandline.
        * **DO NOT follow commit message standards**: Since the first commit message is used to create the Pull Request itself, you ABSOLUTELY SHOULD NOT follow existing or standard commit message guidelines. The PR commit message will be squashed when merged by the user in any case.
        * **Detailed Pull Request Descriptions**: Details regarding justification, investigation, changes, decisions made, and other information about changes should be included as part of the Pull Request description, rather than on a seperate comment.
        * **Auto-Closing Original Issues**: Auto-closing the original issue on merge of a PR can be triggerd by including \`fixes #123\` or \`closes #345\` somewhere within the PR description.
        * **An Issue Link is Already Created**: A separate comment will already be added to the issue, notifying users of the PR creation and linking to it directly. When a Pull Request is created, only respond with a comment if the response is unrelated to the changes made.
        * **DO NOT switch branches**: The current branch has already been created to hold your changes in case a PR is needed.
        * **DO NOT Submit For A PR**: A Pull Request will automatically be created after you have finished if there are any local commits, do not attempt to create one yourself.}
        GITHUB_OUTPUT_EOF_TOKEN
        )"

        # ------------------
        # END DEFAULT PROMPT
        # ------------------

        # This uses subshell expansion to "inflate" the variables in the prompt (passed in or default)
        # Obviously a risk of shell injection here, but given the entire point is for prompt injection
        # and the one passing it is the person setting up the action in the first place...
        echo "Generating opencode prompt"
        [ -z "$UNINTERPRETED_PROMPT" ] && UNINTERPRETED_PROMPT="$DEFAULT_UNINTERPRETED_PROMPT"

        echo "prompt<<GITHUB_OUTPUT_FINAL_OUTPUT_TOKEN
        ${UNINTERPRETED_PROMPT@P}
        GITHUB_OUTPUT_FINAL_OUTPUT_TOKEN" >> $GITHUB_OUTPUT
        echo "::endgroup::"
      env:
        MENTIONS: ${{ inputs.mentions }}
        UNINTERPRETED_PROMPT: ${{ inputs.prompt }}

    - name: Run opencode
      shell: bash
      id: run_opencode
      run: |
        echo "::group::Opencode Command:"
        echo "$OPENCODE_COMMAND"
        echo "::endgroup::"

        echo "-----------------------"
        echo "-- Starting opencode --"
        echo "-----------------------"
        echo "opencode_final_output<<'GITHUB_OUTPUT_FINAL_OUTPUT_TOKEN'" >> $GITHUB_OUTPUT
        opencode run --model "$MODEL" ${AGENT:+--agent "$AGENT"} ${VARIANT:+--variant "$VARIANT"} "$OPENCODE_COMMAND" >> $GITHUB_OUTPUT
        echo "'GITHUB_OUTPUT_FINAL_OUTPUT_TOKEN'" >> $GITHUB_OUTPUT
        echo "-----------------------"
        echo "-- Finished opencode --"
        echo "-----------------------"

        if [ -n "$(git status --porcelain)" ]; then
          echo "::group::Yelling at the model for leaving the git repo dirty"
          echo "Berating the model for not committing changes as it was told to do."
          opencode run --model "$MODEL" ${AGENT:+--agent "$AGENT"} ${VARIANT:+--variant "$VARIANT"} --continue "You have utterly failed at committing some of your changes to git. Either commit your changes or perform a git reset to clean up the repository. Any text respose made to this request will be ignored."
          echo "::endgroup::"
        fi
      env:
        OPENCODE_COMMAND: ${{ steps.build_opencode_prompt.outputs.prompt }}
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        VARIANT: ${{ inputs.variant }}

    - name: Respond with new comment
      shell: bash
      if: |
        steps.run_opencode.outputs.opencode_final_output != '' &&
        steps.run_opencode.outputs.opencode_final_output != 'Changes complete' &&
        steps.run_opencode.outputs.opencode_final_output != 'Changes complete.'
      env:
        OPENCODE_FINAL_OUTPUT: ${{ steps.run_opencode.outputs.opencode_final_output }}
      run: |
        echo "Adding opencode output as a comment."
        ISSUE_ID="$(jq -r '.number' "$RUNNER_TEMP/issue_details.json")"
        ISSUE_API_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/$ISSUE_ID"
        COMMENT_JSON="$(jq -cn --arg body "$OPENCODE_FINAL_OUTPUT" '{body: $body}')"
        curl -X 'POST' "$ISSUE_API_URL/comments" -d "$COMMENT_JSON" > /dev/null

    - name: Discard any uncommitted local changes
      shell: bash
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::group::Cleanup dirty git status"
          echo "Current repo status is STILL dirty. Printing patch file to preserve any critical information in the logs..."
          git add -A
          echo "--------------------"
          echo "Uncommitted changes:"
          echo "--------------------"
          git diff --cached
          echo "--------------------------------------------"
          echo "Cleaning repo to remove uncommitted changes:"
          echo "--------------------------------------------"
          git reset --hard HEAD
          git clean -fd
          echo "::endgroup::"
        fi

    - name: Authorize upstream git operations
      shell: bash
      run: |
        GIT_DOMAIN="$(echo "$GITHUB_SERVER_URL" | awk -F[/:] '{print $4}')"
        SENDER_NAME="$(jq -r '.username' "$RUNNER_TEMP/sender_details.json")"
        # Only doing this AFTER we've finished calling opencode, so it can't push changes on its own
        echo -e "machine $GIT_DOMAIN\nlogin $SENDER_NAME\npassword $GITHUB_TOKEN" > ~/.netrc

    - name: Check for local commits
      shell: bash
      id: check_local_commits
      env:
        BRANCH_NAME: ${{ steps.get_details.outputs.branch_name }}
      run: |
        echo "::group::Checking for local commits"
        # Explicitly switch to the specified branch to make sure we're not on another one for some reason
        git switch $BRANCH_NAME
        UPSTREAM=$(git rev-parse --abbrev-ref @{u} 2>/dev/null || echo "origin/main")
        LOCAL_COMMITS=$(git rev-list "$UPSTREAM..HEAD" --count)
        echo "commit_count=$LOCAL_COMMITS" >> $GITHUB_OUTPUT
        echo "Found $LOCAL_COMMITS local commits"
        echo "::endgroup::"

    - name: Push to branch
      if: steps.check_local_commits.outputs.commit_count != '0'
      env:
        BRANCH_NAME: ${{ steps.get_details.outputs.branch_name }}
      shell: bash
      run: |
        echo "::group::Push git branch to origin"
        git push origin $BRANCH_NAME 2>&1
        echo "::endgroup::"

    - name: Create PR
      if: steps.check_local_commits.outputs.commit_count != '0' && steps.get_details.outputs.issue_type == 'Issue'
      shell: bash
      run: |
        echo "::group::Create a new PR"
        REPO_API_URL="$(jq -r '.url' $RUNNER_TEMP/repo_details.json)"
        ISSUE_ID="$(jq -r '.number' $RUNNER_TEMP/issue_details.json)"
        ISSUE_API_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/$ISSUE_ID"
        PULL_REQ_TITLE="$(git log main..$BRANCH_NAME --format=%s --reverse -1)"
        PULL_REQ_BODY="$(git log main..$BRANCH_NAME --format=%b --reverse -1)"
        PULL_REQ_JSON="$(jq -cn --arg title "$PULL_REQ_TITLE" --arg body "$PULL_REQ_BODY" --arg head "$BRANCH_NAME" --arg base "main" '{title: $title, body: $body, head: $head, base: $base}')"
        ACTION_RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_NUMBER"
        BRANCH_COMMENT_NO_KEY="Created branch [$BRANCH_NAME]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/src/branch/$BRANCH_NAME) with changes via [Action Run]($ACTION_RUN_URL).
        [Create a PR from this branch]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/main...$BRANCH_NAME)
        <sub>Note: Passing a pr-creation-pat with read/write repository access as input allows creating these PRs automagically</sub>"
        BRANCH_COMMENT_FAILED_KEY="Created branch [$BRANCH_NAME]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/src/branch/$BRANCH_NAME) with changes via [Action Run]($ACTION_RUN_URL).
        [Create a PR from this branch]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/main...$BRANCH_NAME)
        <sub>Note: Using the pr-creation-pat to create a PR failed with "
        
        if [ -z "$PR_CREATION_PAT" ]; then
          echo "Dropping a comment regarding the branch instead of actually creating a PR since the ephemeral token doesn't have permissions for it"
          BRANCH_COMMENT_JSON="$(jq -cn --arg body "$BRANCH_COMMENT_NO_KEY" '{body: $body}')"
          curl -X 'POST' "$ISSUE_API_URL/comments" -d "$BRANCH_COMMENT_JSON" > /dev/null
        else
          echo "Creating PR using a special access key"
          # BEWARE -- This request is not using the normal curlrc file (-q flag) and is instead using a custom PAT
          echo "PULL_REQ_JSON = $PULL_REQ_JSON"
          PR_CREATE_RESP="$(curl -qsSL -X 'POST' -w "HTTP_STATUS:%{http_code}" -H "Authorization: Bearer $PR_CREATION_PAT" -H "Content-Type: application/json" -H "Accept: application/json" "$REPO_API_URL/pulls" -d "$PULL_REQ_JSON")"
          PR_CREATE_STATUS_CODE="$(echo "$PR_CREATE_RESP" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')"
          PR_CREATE_JSON_RESP="$(echo "$PR_CREATE_RESP" | sed -e 's/HTTP_STATUS:[0-9]\{3\}$//')"
          PR_NUM_CREATED="$(echo "$PR_CREATE_JSON_RESP" | jq -r '.number')"
          PR_CREATION_RESP_MESSAGE="$(echo "$PR_CREATE_JSON_RESP" | jq -r '.message')"
          if [ $PR_CREATE_STATUS_CODE -ge 200 ] && [ $PR_CREATE_STATUS_CODE -le 299 ]; then
            echo "Leaving a comment in the original issue with the PR reference"
            PR_COMMENT_JSON="$(jq -cn --arg body "Created PR #$PR_NUM_CREATED via [Action Run]($ACTION_RUN_URL)" '{body: $body}')"
            curl -X 'POST' "$ISSUE_API_URL/comments" -d "$PR_COMMENT_JSON" > /dev/null
          else
            echo "Dropping a comment referring to the branch itself, since creating the PR failed"
            BRANCH_COMMENT_JSON="$(jq -cn --arg body "$BRANCH_COMMENT_FAILED_KEY Resp Code: $PR_CREATE_STATUS_CODE and Message: $PR_CREATION_RESP_MESSAGE </sub>" '{body: $body}')"
            curl -X 'POST' "$ISSUE_API_URL/comments" -d "$BRANCH_COMMENT_JSON" > /dev/null
          fi
        fi
        echo "::endgroup::"
      env:
        BRANCH_NAME: ${{ steps.get_details.outputs.branch_name }}
        PR_CREATION_PAT: ${{ inputs.pr-creation-pat }}

    - name: Unreact to comment
      shell: bash
      if: always() && github.event_name == 'issue_comment'
      run: |
        # Just in case
        echo "::endgroup::"
        # Easy when it's a regular comment, otherwise won't worry about it
        COMMENT_ID="$(jq -r '.comment.id' $GITHUB_EVENT_PATH)"
        REPO_API_URL="$(jq -r '.url' "$RUNNER_TEMP/repo_details.json")"
        echo "Unreacting to original comment"
        curl -X 'DELETE' "$REPO_API_URL/issues/comments/$COMMENT_ID/reactions" -d '{"content": "eyes"}' > /dev/null

    - name: Cleanup
      shell: bash
      if: always()
      run: rm -f ~/.netrc ~/.curlrc
